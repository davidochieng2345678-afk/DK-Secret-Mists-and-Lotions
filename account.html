<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | DK Secrets</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fffaf7; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 2px solid #f0cdc0;
    }
    .logo { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #8C2A3B, #C75C4A); -webkit-background-clip: text; background-clip: text; color: transparent; text-decoration: none; }
    .logo span { background: none; color: #8C2A3B; }
    .account-container { display: grid; grid-template-columns: 260px 1fr; gap: 48px; margin: 40px 0; }
    .sidebar { background: white; border-radius: 28px; padding: 24px; border: 1px solid #f0cdc0; }
    .sidebar ul { list-style: none; margin-top: 20px; }
    .sidebar li { padding: 12px; margin: 4px 0; border-radius: 16px; cursor: pointer; font-weight: 500; }
    .sidebar li:hover { background: #f9e0e4; }
    .sidebar li.active { background: #8C2A3B; color: white; }
    .content { background: white; border-radius: 28px; padding: 32px; border: 1px solid #f0cdc0; }
    .order-card { border: 1px solid #f0cdc0; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
    .order-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .order-status { padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: 600; }
    .status-pending { background: #fff3e0; color: #c75c4a; }
    .status-processing { background: #e0f2e9; color: #2e7d64; }
    .status-shipped { background: #e0e7ff; color: #4f46e5; }
    .status-delivered { background: #dcfce7; color: #15803d; }
    footer { background: #1f1210; color: #f2cfc4; padding: 32px 0; text-align: center; margin-top: 64px; }
    @media (max-width: 768px) { .account-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="container">
  <div class="navbar">
    <a href="index.html" class="logo">DK<span> Secrets</span></a>
    <div id="authSection"><button class="auth-btn" id="authButton" style="background:#8C2A3B; color:white; padding:8px 20px; border-radius:40px;">Sign In</button></div>
  </div>
  <div id="accountContent"><div class="loading" style="text-align:center; padding:60px;">Loading account...</div></div>
</div>
<footer><div class="container"><p>© 2025 DK Secrets - Authentic Victoria's Secret</p></div></footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs, doc, getDoc, orderBy } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyDnMnyROtTSjvAswLAYAmpJrFf0wZEaYIM",
    authDomain: "dk-secret-mists-and-lotions.firebaseapp.com",
    projectId: "dk-secret-mists-and-lotions",
    storageBucket: "dk-secret-mists-and-lotions.firebasestorage.app",
    messagingSenderId: "153687274132",
    appId: "1:153687274132:web:e9de13864e001be927ba81"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  
  let currentUser = null;
  let activeTab = 'orders';
  
  async function loadAccount() {
    if (!currentUser) {
      document.getElementById('accountContent').innerHTML = `<div style="text-align:center; padding:60px;"><h2>Please Sign In</h2><button class="auth-btn" id="loginBtn" style="background:#8C2A3B; color:white; padding:10px 24px; border-radius:40px;">Sign In</button></div>`;
      document.getElementById('loginBtn')?.addEventListener('click', () => {
        const email = prompt("Email:"); const password = prompt("Password:");
        if (email && password) signInWithEmailAndPassword(auth, email, password).catch(() => alert("Login failed"));
      });
      return;
    }
    renderAccountPage();
  }
  
  async function renderAccountPage() {
    const container = document.getElementById('accountContent');
    container.innerHTML = `
      <div class="account-container">
        <div class="sidebar"><div style="text-align:center;"><div style="font-size:3rem;">👤</div><div><strong>${currentUser.email.split('@')[0]}</strong></div><div style="font-size:0.8rem; color:#a64b3a;">${currentUser.email}</div></div>
          <ul><li data-tab="orders" class="${activeTab === 'orders' ? 'active' : ''}">📦 My Orders</li><li data-tab="wishlist" class="${activeTab === 'wishlist' ? 'active' : ''}">❤️ Wishlist</li><li data-tab="profile" class="${activeTab === 'profile' ? 'active' : ''}">👤 Profile</li></ul>
        </div>
        <div class="content" id="tabContent"><div class="loading">Loading...</div></div>
      </div>
    `;
    document.querySelectorAll('.sidebar li').forEach(item => {
      item.addEventListener('click', () => { activeTab = item.dataset.tab; renderAccountPage(); });
    });
    if (activeTab === 'orders') await loadOrders();
    else if (activeTab === 'wishlist') await loadWishlist();
    else if (activeTab === 'profile') renderProfile();
  }
  
  async function loadOrders() {
    const tabContent = document.getElementById('tabContent');
    tabContent.innerHTML = '<div class="loading">Loading orders...</div>';
    const q = query(collection(db, "orders"), where("userId", "==", currentUser.uid), orderBy("createdAt", "desc"));
    const snapshot = await getDocs(q);
    if (snapshot.empty) { tabContent.innerHTML = '<p>No orders yet.</p>'; return; }
    let html = '<h2>My Orders</h2>';
    snapshot.forEach(docSnap => {
      const order = docSnap.data();
      const totalKsh = (order.total * 145).toLocaleString();
      html += `<div class="order-card"><div class="order-header"><span>Order #${docSnap.id.slice(-8)}</span><span class="order-status status-${order.status}">${order.status.toUpperCase()}</span><span>KSh ${totalKsh}</span></div><div>${order.items.map(i => `${i.name} x${i.quantity}`).join(', ')}</div><div style="font-size:0.75rem; margin-top:8px;">${new Date(order.createdAt?.toDate()).toLocaleDateString()}</div></div>`;
    });
    tabContent.innerHTML = html;
  }
  
  async function loadWishlist() {
    const tabContent = document.getElementById('tabContent');
    const wishlistRef = doc(db, "wishlists", currentUser.uid);
    const wishlistDoc = await getDoc(wishlistRef);
    const items = wishlistDoc.exists() ? wishlistDoc.data().items : [];
    if (items.length === 0) { tabContent.innerHTML = '<p>Your wishlist is empty.</p>'; return; }
    let html = '<h2>My Wishlist</h2><div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px;">';
    for (let item of items) {
      const prodRef = doc(db, "products", item.id);
      const prodSnap = await getDoc(prodRef);
      if (prodSnap.exists()) {
        const prod = prodSnap.data();
        html += `<div style="border:1px solid #f0cdc0; border-radius:20px; padding:16px; text-align:center;"><img src="${prod.imageUrl || 'https://placehold.co/200x200'}" style="width:100%; border-radius:16px;"><h4>${prod.name}</h4><p>KSh ${(prod.price * 145).toLocaleString()}</p><button class="add-to-cart-btn" data-id="${item.id}" style="background:#8C2A3B; color:white; border:none; padding:8px 16px; border-radius:30px; margin-top:8px; cursor:pointer;">Add to Cart</button></div>`;
      }
    }
    html += '</div>';
    tabContent.innerHTML = html;
    document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const id = btn.dataset.id;
        const prodRef = doc(db, "products", id);
        const prodSnap = await getDoc(prodRef);
        if (prodSnap.exists()) {
          const prod = prodSnap.data();
          const cartRef = doc(db, "carts", currentUser.uid);
          const cartDoc = await getDoc(cartRef);
          let cart = cartDoc.exists() ? cartDoc.data().items : [];
          const existing = cart.find(i => i.id === id);
          if (existing) existing.quantity++;
          else cart.push({ id, name: prod.name, price: prod.price, quantity: 1 });
          await setDoc(cartRef, { items: cart, updatedAt: new Date() }, { merge: true });
          alert("Added to cart!");
        }
      });
    });
  }
  
  function renderProfile() {
    document.getElementById('tabContent').innerHTML = `
      <h2>Profile Settings</h2><p>Email: ${currentUser.email}</p><button id="changePasswordBtn" style="background:#8C2A3B; color:white; padding:10px 24px; border-radius:40px; border:none; margin-top:20px; cursor:pointer;">Change Password</button>
    `;
    document.getElementById('changePasswordBtn')?.addEventListener('click', async () => {
      const newPass = prompt("Enter new password:");
      if (newPass) { await updatePassword(currentUser, newPass); alert("Password updated!"); }
    });
  }
  
  function updateAuthUI(user) {
    const authSection = document.getElementById('authSection');
    if (user) authSection.innerHTML = `<span>${user.email}</span> <button class="auth-btn" id="authButton" style="background:#8C2A3B; color:white; padding:8px 20px; border-radius:40px;">Logout</button>`;
    else authSection.innerHTML = `<button class="auth-btn" id="authButton" style="background:#8C2A3B; color:white; padding:8px 20px; border-radius:40px;">Sign In</button>`;
    document.getElementById('authButton')?.onclick = () => user ? signOut(auth) : (() => { const e=prompt("Email:"), p=prompt("Password:"); if(e&&p) signInWithEmailAndPassword(auth,e,p).catch(()=>{if(confirm("Create account?")) createUserWithEmailAndPassword(auth,e,p);}); })();
  }
  
  onAuthStateChanged(auth, async (user) => { currentUser = user; updateAuthUI(user); await loadAccount(); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | DK World Kenya</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fffaf7; color: #2d2a27; }
    .container { max-width: 1400px; margin: 0 auto; padding: 0 32px; }
    
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      flex-wrap: wrap;
      gap: 20px;
      border-bottom: 2px solid #f0cdc0;
    }
    .logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #8C2A3B, #C75C4A);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-decoration: none;
    }
    .logo span { background: none; color: #8C2A3B; }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .cart-icon { position: relative; cursor: pointer; font-size: 1.6rem; }
    .cart-count {
      position: absolute; top: -8px; right: -12px; background: #C75C4A;
      color: white; font-size: 0.7rem; border-radius: 50%;
      width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
    }
    .auth-btn {
      background: #8C2A3B; color: white; padding: 8px 20px; border-radius: 40px;
      border: none; cursor: pointer;
    }
    
    .account-container {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 48px;
      margin: 40px 0 80px;
    }
    .sidebar {
      background: white;
      border-radius: 28px;
      padding: 24px;
      border: 1px solid #f0cdc0;
      position: sticky;
      top: 20px;
    }
    .user-avatar {
      text-align: center;
      margin-bottom: 24px;
    }
    .avatar-icon { font-size: 4rem; }
    .user-name { font-weight: 700; color: #6B1E2A; margin-top: 8px; }
    .user-email { font-size: 0.8rem; color: #a64b3a; }
    .sidebar-menu { list-style: none; margin-top: 24px; }
    .sidebar-menu li {
      padding: 12px;
      margin: 4px 0;
      border-radius: 16px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 500;
    }
    .sidebar-menu li:hover { background: #f9e0e4; }
    .sidebar-menu li.active { background: #8C2A3B; color: white; }
    
    .content-area {
      background: white;
      border-radius: 28px;
      padding: 32px;
      border: 1px solid #f0cdc0;
    }
    .content-area h2 { color: #6B1E2A; margin-bottom: 24px; }
    
    .orders-list { display: flex; flex-direction: column; gap: 20px; }
    .order-card {
      border: 1px solid #f0cdc0;
      border-radius: 20px;
      padding: 20px;
      transition: 0.2s;
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0cdc0;
    }
    .order-id { font-weight: 700; color: #6B1E2A; }
    .order-status {
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .status-pending { background: #fff3e0; color: #c75c4a; }
    .status-processing { background: #e0f2e9; color: #2e7d64; }
    .status-shipped { background: #e0e7ff; color: #4f46e5; }
    .status-delivered { background: #dcfce7; color: #15803d; }
    .order-total { font-weight: 700; color: #C75C4A; }
    .order-items { font-size: 0.85rem; color: #a64b3a; margin-top: 8px; }
    
    .profile-form .form-group { margin-bottom: 20px; }
    .profile-form label { display: block; font-weight: 600; color: #8C2A3B; margin-bottom: 8px; }
    .profile-form input, .profile-form textarea {
      width: 100%;
      padding: 12px 16px;
      border-radius: 16px;
      border: 1px solid #f0cdc0;
      font-family: 'Inter', sans-serif;
    }
    .save-btn {
      background: #8C2A3B;
      color: white;
      padding: 12px 32px;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .empty-state { text-align: center; padding: 60px; color: #a64b3a; }
    .loading { text-align: center; padding: 60px; font-size: 1.2rem; color: #a64b3a; }
    
    footer { background: #1f1210; color: #f2cfc4; padding: 48px 0 24px; margin-top: 64px; }
    .footer-grid { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 32px; }
    .copyright { text-align: center; margin-top: 48px; font-size: 0.8rem; }
    
    @media (max-width: 768px) {
      .account-container { grid-template-columns: 1fr; }
      .container { padding: 0 20px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="navbar">
    <a href="index.html" class="logo">DK<span> World Kenya</span></a>
    <div class="nav-links">
      <a href="index.html">Shop</a>
      <div class="cart-icon" id="cartIcon">🛒 <span class="cart-count" id="cartCount">0</span></div>
      <div id="authSection"><button class="auth-btn" id="authButton">Sign In</button></div>
    </div>
  </div>
</div>

<div class="container">
  <div id="accountContent"><div class="loading">Loading account...</div></div>
</div>

<footer>
  <div class="container">
    <div class="footer-grid">
      <div><h4 style="color:#f2dad0;">DK World Kenya</h4><p>Official Reseller</p></div>
      <div><p>📍 Nairobi, Kenya</p><p>📞 +254 700 000 000</p></div>
      <div><p>🔒 Your account is secure</p></div>
    </div>
    <div class="copyright"><p>© 2025 DK World Kenya</p></div>
  </div>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyABCVM1b9FEdXlJWf1SoL7dwQL1EXPXwgA",
    authDomain: "dkworld-kenya.firebaseapp.com",
    projectId: "dkworld-kenya",
    storageBucket: "dkworld-kenya.firebasestorage.app",
    messagingSenderId: "263537160242",
    appId: "1:263537160242:web:85f756e7a0ea9fcf584c2b"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  
  let currentUser = null;
  let activeTab = 'orders';
  
  async function loadAccount() {
    if (!currentUser) {
      document.getElementById('accountContent').innerHTML = `
        <div class="empty-state">
          <h2>Please Sign In</h2>
          <p>Sign in to view your orders and manage your account.</p>
          <button class="auth-btn" id="loginBtn" style="margin-top:20px;">Sign In</button>
        </div>
      `;
      document.getElementById('loginBtn')?.addEventListener('click', () => {
        const email = prompt("Email:");
        const password = prompt("Password:");
        if (email && password) signInWithEmailAndPassword(auth, email, password).catch(() => alert("Login failed"));
      });
      return;
    }
    
    renderAccountPage();
  }
  
  async function renderAccountPage() {
    const container = document.getElementById('accountContent');
    container.innerHTML = `
      <div class="account-container">
        <div class="sidebar">
          <div class="user-avatar">
            <div class="avatar-icon">👤</div>
            <div class="user-name">${currentUser.email.split('@')[0]}</div>
            <div class="user-email">${currentUser.email}</div>
          </div>
          <ul class="sidebar-menu">
            <li data-tab="orders" class="${activeTab === 'orders' ? 'active' : ''}">📦 My Orders</li>
            <li data-tab="profile" class="${activeTab === 'profile' ? 'active' : ''}">👤 Profile Settings</li>
            <li data-tab="addresses" class="${activeTab === 'addresses' ? 'active' : ''}">📍 Saved Addresses</li>
            <li data-tab="wishlist" class="${activeTab === 'wishlist' ? 'active' : ''}">❤️ Wishlist</li>
          </ul>
        </div>
        <div class="content-area" id="tabContent">
          <div class="loading">Loading...</div>
        </div>
      </div>
    `;
    
    document.querySelectorAll('.sidebar-menu li').forEach(item => {
      item.addEventListener('click', () => {
        activeTab = item.dataset.tab;
        renderAccountPage();
      });
    });
    
    // Load tab content
    if (activeTab === 'orders') await loadOrders();
    else if (activeTab === 'profile') renderProfileForm();
    else if (activeTab === 'addresses') await loadAddresses();
    else if (activeTab === 'wishlist') await loadWishlist();
  }
  
  async function loadOrders() {
    const tabContent = document.getElementById('tabContent');
    tabContent.innerHTML = '<div class="loading">Loading your orders...</div>';
    
    const q = query(collection(db, "orders"), where("userId", "==", currentUser.uid), orderBy("createdAt", "desc"));
    const querySnapshot = await getDocs(q);
    
    if (querySnapshot.empty) {
      tabContent.innerHTML = '<div class="empty-state"><h2>No orders yet</h2><p>Your order history will appear here.</p><a href="index.html" style="background:#8C2A3B; color:white; padding:10px 24px; border-radius:60px; text-decoration:none; display:inline-block; margin-top:20px;">Start Shopping</a></div>';
      return;
    }
    
    let ordersHtml = '<h2>My Orders</h2><div class="orders-list">';
    querySnapshot.forEach(docSnap => {
      const order = docSnap.data();
      const totalKsh = (order.total * 145).toLocaleString();
      const statusClass = `status-${order.status}`;
      const itemsText = order.items.map(i => `${i.name} x${i.quantity}`).join(', ');
      ordersHtml += `
        <div class="order-card">
          <div class="order-header">
            <span class="order-id">Order #${docSnap.id.slice(-8)}</span>
            <span class="order-status ${statusClass}">${order.status.toUpperCase()}</span>
            <span class="order-total">KSh ${totalKsh}</span>
          </div>
          <div class="order-items">${itemsText}</div>
          <div style="margin-top:12px; font-size:0.75rem; color:#a64b3a;">${new Date(order.createdAt?.toDate()).toLocaleDateString()}</div>
        </div>
      `;
    });
    ordersHtml += '</div>';
    tabContent.innerHTML = ordersHtml;
  }
  
  function renderProfileForm() {
    const tabContent = document.getElementById('tabContent');
    tabContent.innerHTML = `
      <h2>Profile Settings</h2>
      <form id="profileForm" class="profile-form">
        <div class="form-group">
          <label>Email (cannot change)</label>
          <input type="email" value="${currentUser.email}" disabled>
        </div>
        <div class="form-group">
          <label>New Password (leave blank to keep same)</label>
          <input type="password" id="newPassword" placeholder="Enter new password">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm new password">
        </div>
        <button type="submit" class="save-btn">Update Password</button>
      </form>
    `;
    
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPass = document.getElementById('newPassword').value;
      const confirmPass = document.getElementById('confirmPassword').value;
      if (newPass && newPass !== confirmPass) {
        alert("Passwords do not match.");
        return;
      }
      if (newPass) {
        try {
          await updatePassword(currentUser, newPass);
          alert("Password updated successfully!");
          document.getElementById('newPassword').value = '';
          document.getElementById('confirmPassword').value = '';
        } catch (error) {
          alert("Error updating password: " + error.message);
        }
      } else {
        alert("No changes made.");
      }
    });
  }
  
  async function loadAddresses() {
    const tabContent = document.getElementById('tabContent');
    const userRef = doc(db, "users", currentUser.uid);
    const userSnap = await getDoc(userRef);
    const addresses = userSnap.exists() ? userSnap.data().addresses || [] : [];
    
    tabContent.innerHTML = `
      <h2>Saved Addresses</h2>
      <div id="addressesList">
        ${addresses.length === 0 ? '<p>No saved addresses yet.</p>' : addresses.map((addr, i) => `
          <div class="address-card" style="border:1px solid #f0cdc0; border-radius:16px; padding:16px; margin-bottom:12px;">
            <p><strong>${addr.name}</strong></p>
            <p>${addr.street}, ${addr.city}, ${addr.county}</p>
            <p>Phone: ${addr.phone}</p>
            <button class="remove-address" data-index="${i}" style="background:#fce4e4; border:none; padding:4px 12px; border-radius:30px; margin-top:8px; cursor:pointer;">Remove</button>
          </div>
        `).join('')}
      </div>
      <h3 style="margin-top:32px;">Add New Address</h3>
      <form id="addressForm" class="profile-form">
        <div class="form-group"><label>Full Name</label><input type="text" id="addrName" required></div>
        <div class="form-group"><label>Street Address</label><input type="text" id="addrStreet" required></div>
        <div class="form-group"><label>City</label><input type="text" id="addrCity" required></div>
        <div class="form-group"><label>County</label><input type="text" id="addrCounty" required></div>
        <div class="form-group"><label>Phone</label><input type="tel" id="addrPhone" required></div>
        <button type="submit" class="save-btn">Save Address</button>
      </form>
    `;
    
    document.querySelectorAll('.remove-address').forEach(btn => {
      btn.addEventListener('click', async () => {
        const index = parseInt(btn.dataset.index);
        addresses.splice(index, 1);
        await setDoc(doc(db, "users", currentUser.uid), { addresses: addresses }, { merge: true });
        loadAddresses();
      });
    });
    
    document.getElementById('addressForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newAddress = {
        name: document.getElementById('addrName').value,
        street: document.getElementById('addrStreet').value,
        city: document.getElementById('addrCity').value,
        county: document.getElementById('addrCounty').value,
        phone: document.getElementById('addrPhone').value
      };
      addresses.push(newAddress);
      await setDoc(doc(db, "users", currentUser.uid), { addresses: addresses }, { merge: true });
      loadAddresses();
    });
  }
  
  async function loadWishlist() {
    const tabContent = document.getElementById('tabContent');
    const wishlistRef = doc(db, "wishlists", currentUser.uid);
    const wishlistSnap = await getDoc(wishlistRef);
    const wishlist = wishlistSnap.exists() ? wishlistSnap.data().items : [];
    
    if (wishlist.length === 0) {
      tabContent.innerHTML = '<div class="empty-state"><h2>Your wishlist is empty</h2><p>Save your favorite products here.</p><a href="index.html" style="background:#8C2A3B; color:white; padding:10px 24px; border-radius:60px; text-decoration:none; display:inline-block; margin-top:20px;">Shop Now</a></div>';
      return;
    }
    
    let html = '<h2>My Wishlist</h2><div class="wishlist-grid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px;">';
    for (let item of wishlist) {
      const productRef = doc(db, "products", item.id);
      const prodSnap = await getDoc(productRef);
      if (prodSnap.exists()) {
        const prod = prodSnap.data();
        html += `
          <div class="wishlist-item" style="border:1px solid #f0cdc0; border-radius:20px; padding:16px; text-align:center;">
            <img src="${prod.imageUrl || 'https://placehold.co/200x200'}" style="width:100%; border-radius:16px;">
            <h4>${prod.name}</h4>
            <p>KSh ${(prod.price * 145).toLocaleString()}</p>
            <button class="move-to-cart" data-id="${item.id}" style="background:#8C2A3B; color:white; border:none; padding:8px 16px; border-radius:30px; cursor:pointer; margin-top:8px;">Add to Cart</button>
          </div>
        `;
      }
    }
    html += '</div>';
    tabContent.innerHTML = html;
    
    document.querySelectorAll('.move-to-cart').forEach(btn => {
      btn.addEventListener('click', async () => {
        // Add to cart logic (simplified)
        const productId = btn.dataset.id;
        const productRef = doc(db, "products", productId);
        const prodSnap = await getDoc(productRef);
        if (prodSnap.exists()) {
          const prod = prodSnap.data();
          const cartRef = doc(db, "carts", currentUser.uid);
          const cartDoc = await getDoc(cartRef);
          let cart = cartDoc.exists() ? cartDoc.data().items : [];
          const existing = cart.find(i => i.id === productId);
          if (existing) existing.quantity++;
          else cart.push({ id: productId, name: prod.name, price: prod.price, quantity: 1 });
          await setDoc(cartRef, { items: cart, updatedAt: new Date() }, { merge: true });
          alert("Added to cart!");
        }
      });
    });
  }
  
  async function updateCartCount() {
    let count = 0;
    if (currentUser) {
      const cartRef = doc(db, "carts", currentUser.uid);
      const cartDoc = await getDoc(cartRef);
      if (cartDoc.exists()) count = cartDoc.data().items.reduce((s,i) => s + i.quantity, 0);
    }
    document.getElementById('cartCount').innerText = count;
  }
  
  function updateAuthUI(user) {
    const authSection = document.getElementById('authSection');
    if (user) {
      authSection.innerHTML = `<span style="margin-right:12px;">${user.email}</span> <button class="auth-btn" id="authButton">Logout</button>`;
      document.getElementById('authButton').onclick = () => signOut(auth);
    } else {
      authSection.innerHTML = `<button class="auth-btn" id="authButton">Sign In</button>`;
      document.getElementById('authButton').onclick = () => {
        const email = prompt("Email:");
        const password = prompt("Password:");
        if (email && password) signInWithEmailAndPassword(auth, email, password).catch(() => {
          if (confirm("Create account?")) createUserWithEmailAndPassword(auth, email, password);
        });
      };
    }
  }
  
  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    updateAuthUI(user);
    await loadAccount();
    await updateCartCount();
  });
  
  document.getElementById('cartIcon').onclick = () => window.location.href = 'cart.html';
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | DK Secrets</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fffaf7; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 2px solid #f0cdc0;
      margin-bottom: 40px;
    }
    .logo { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #8C2A3B, #C75C4A); -webkit-background-clip: text; background-clip: text; color: transparent; text-decoration: none; }
    .logo span { background: none; color: #8C2A3B; }
    .checkout-container { display: grid; grid-template-columns: 1fr 380px; gap: 48px; margin: 40px 0 80px; }
    .form-section { background: white; border-radius: 28px; padding: 28px; margin-bottom: 32px; border: 1px solid #f0cdc0; }
    .form-section h3 { color: #6B1E2A; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 600; color: #8C2A3B; margin-bottom: 8px; }
    .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 16px; border: 1px solid #f0cdc0; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .payment-option { display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid #f0cdc0; border-radius: 16px; margin-bottom: 12px; cursor: pointer; }
    .payment-option.selected { border-color: #C75C4A; background: #fff5f2; }
    .mpesa-details { margin-top: 16px; padding: 16px; background: #f9ede5; border-radius: 16px; display: none; }
    .mpesa-details.active { display: block; }
    .order-summary { background: white; border-radius: 28px; padding: 28px; border: 1px solid #f0cdc0; position: sticky; top: 20px; }
    .summary-row { display: flex; justify-content: space-between; padding: 12px 0; }
    .summary-total { border-top: 2px solid #f0cdc0; padding-top: 16px; font-weight: 800; font-size: 1.3rem; }
    .place-order-btn { background: #8C2A3B; color: white; width: 100%; padding: 16px; border: none; border-radius: 60px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 24px; }
    .empty-cart { text-align: center; padding: 80px; background: white; border-radius: 28px; }
    footer { background: #1f1210; color: #f2cfc4; padding: 32px 0; text-align: center; margin-top: 64px; }
    @media (max-width: 768px) { .checkout-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="container">
  <div class="navbar">
    <a href="index.html" class="logo">DK<span> Secrets</span></a>
    <div id="authSection"><button class="auth-btn" id="authButton" style="background:#8C2A3B; color:white; padding:8px 20px; border-radius:40px; border:none;">Sign In</button></div>
  </div>
  <div id="checkoutContent"><div class="empty-cart">Loading checkout...</div></div>
</div>
<footer><div class="container"><p>© 2025 DK Secrets - Authentic Victoria's Secret</p></div></footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyDnMnyROtTSjvAswLAYAmpJrFf0wZEaYIM",
    authDomain: "dk-secret-mists-and-lotions.firebaseapp.com",
    projectId: "dk-secret-mists-and-lotions",
    storageBucket: "dk-secret-mists-and-lotions.firebasestorage.app",
    messagingSenderId: "153687274132",
    appId: "1:153687274132:web:e9de13864e001be927ba81"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  
  let currentUser = null;
  let cartItems = [];
  let subtotal = 0, shipping = 0, tax = 0, total = 0;
  
  async function loadCheckout() {
    if (!currentUser) {
      document.getElementById('checkoutContent').innerHTML = `<div class="empty-cart"><h2>Please Sign In</h2><button class="auth-btn" id="loginBtn">Sign In</button></div>`;
      document.getElementById('loginBtn')?.addEventListener('click', () => {
        const email = prompt("Email:"); const password = prompt("Password:");
        if (email && password) signInWithEmailAndPassword(auth, email, password).catch(() => alert("Login failed"));
      });
      return;
    }
    const cartRef = doc(db, "carts", currentUser.uid);
    const cartDoc = await getDoc(cartRef);
    cartItems = cartDoc.exists() ? cartDoc.data().items : [];
    if (cartItems.length === 0) {
      document.getElementById('checkoutContent').innerHTML = `<div class="empty-cart"><h2>Your cart is empty</h2><a href="index.html" style="background:#8C2A3B; color:white; padding:12px 32px; border-radius:60px; text-decoration:none;">Shop Now</a></div>`;
      return;
    }
    let cartDetails = [];
    subtotal = 0;
    for (let item of cartItems) {
      const prodRef = doc(db, "products", item.id);
      const prodSnap = await getDoc(prodRef);
      if (prodSnap.exists()) {
        const prod = prodSnap.data();
        subtotal += prod.price * item.quantity;
        cartDetails.push({ ...item, product: prod });
      }
    }
    const freeThreshold = 34.48;
    shipping = subtotal >= freeThreshold ? 0 : 5.99;
    tax = subtotal * 0.08;
    total = subtotal + shipping + tax;
    renderForm(cartDetails);
  }
  
  function renderForm(cartDetails) {
    const container = document.getElementById('checkoutContent');
    container.innerHTML = `
      <div class="checkout-container">
        <div><h2>Checkout</h2>
          <div class="form-section"><h3>Contact Information</h3><div class="form-group"><label>Full Name</label><input type="text" id="fullName" required></div><div class="form-group"><label>Email</label><input type="email" id="email" value="${currentUser.email}" readonly disabled></div><div class="form-group"><label>Phone</label><input type="tel" id="phone" required></div></div>
          <div class="form-section"><h3>Shipping Address</h3><div class="form-group"><label>Street Address</label><input type="text" id="address" required></div><div class="form-row"><div class="form-group"><label>City</label><input type="text" id="city" required></div><div class="form-group"><label>County</label><input type="text" id="county" required></div></div></div>
          <div class="form-section"><h3>Payment Method</h3><div class="payment-option" data-method="mpesa"><input type="radio" name="paymentMethod" value="mpesa" id="mpesaRadio"> <label for="mpesaRadio">💳 M-Pesa</label></div><div class="payment-option" data-method="card"><input type="radio" name="paymentMethod" value="card" id="cardRadio"> <label for="cardRadio">💳 Credit/Debit Card</label></div><div id="mpesaDetails" class="mpesa-details"><p><strong>Paybill: 123456</strong></p><p>Account: ${currentUser.uid.slice(-8)}</p><p>Amount: <strong id="mpesaAmount">KSh 0</strong></p><input type="text" id="mpesaCode" placeholder="M-Pesa transaction code" style="width:100%; margin-top:12px; padding:10px; border-radius:12px;"></div></div>
          <button class="place-order-btn" id="placeOrderBtn">Place Order</button>
        </div>
        <div class="order-summary" id="orderSummary"></div>
      </div>
    `;
    const totalKsh = (total * 145).toLocaleString();
    let itemsHtml = '';
    for (let item of cartDetails) {
      itemsHtml += `<div class="summary-row"><span>${item.product.name} x ${item.quantity}</span><span>KSh ${(item.product.price * item.quantity * 145).toLocaleString()}</span></div>`;
    }
    document.getElementById('orderSummary').innerHTML = `<h3>Order Summary</h3>${itemsHtml}<div class="summary-row"><span>Subtotal</span><span>KSh ${(subtotal * 145).toLocaleString()}</span></div><div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? 'FREE' : `KSh ${(shipping * 145).toLocaleString()}`}</span></div><div class="summary-row"><span>Tax (8%)</span><span>KSh ${(tax * 145).toLocaleString()}</span></div><div class="summary-total"><span>Total</span><span>KSh ${totalKsh}</span></div>`;
    document.getElementById('mpesaAmount').innerText = `KSh ${totalKsh}`;
    
    document.querySelectorAll('.payment-option').forEach(opt => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        const method = opt.dataset.method;
        document.getElementById('mpesaDetails').classList.toggle('active', method === 'mpesa');
      });
    });
    document.getElementById('placeOrderBtn').onclick = placeOrder;
  }
  
  async function placeOrder() {
    const fullName = document.getElementById('fullName').value;
    const phone = document.getElementById('phone').value;
    const address = document.getElementById('address').value;
    const city = document.getElementById('city').value;
    const county = document.getElementById('county').value;
    const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked')?.value;
    if (!fullName || !phone || !address || !city || !county || !paymentMethod) { alert("Fill all fields"); return; }
    if (paymentMethod === 'mpesa') {
      const mpesaCode = document.getElementById('mpesaCode').value;
      if (!mpesaCode) { alert("Enter M-Pesa transaction code"); return; }
    }
    const orderData = {
      userId: currentUser.uid, customerName: fullName, email: currentUser.email, phone: phone,
      shippingAddress: { address, city, county }, items: cartItems,
      subtotal, shipping, tax, total, paymentMethod, mpesaCode: paymentMethod === 'mpesa' ? document.getElementById('mpesaCode').value : null,
      status: 'pending', createdAt: serverTimestamp()
    };
    const orderRef = await addDoc(collection(db, "orders"), orderData);
    await setDoc(doc(db, "carts", currentUser.uid), { items: [], updatedAt: new Date() });
    window.location.href = `order-confirmation.html?id=${orderRef.id}`;
  }
  
  function updateAuthUI(user) {
    const authSection = document.getElementById('authSection');
    if (user) authSection.innerHTML = `<span>${user.email}</span> <button class="auth-btn" id="authButton" style="background:#8C2A3B; color:white; padding:8px 20px; border-radius:40px;">Logout</button>`;
    else authSection.innerHTML = `<button class="auth-btn" id="authButton" style="background:#8C2A3B; color:white; padding:8px 20px; border-radius:40px;">Sign In</button>`;
    document.getElementById('authButton')?.onclick = () => user ? signOut(auth) : (() => { const e=prompt("Email:"), p=prompt("Password:"); if(e&&p) signInWithEmailAndPassword(auth,e,p).catch(()=>{if(confirm("Create account?")) createUserWithEmailAndPassword(auth,e,p);}); })();
  }
  
  onAuthStateChanged(auth, async (user) => { currentUser = user; updateAuthUI(user); await loadCheckout(); });
</script>
</body>
</html>

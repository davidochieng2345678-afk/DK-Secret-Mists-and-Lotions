<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed | DK Secrets</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fffaf7; text-align: center; }
    .container { max-width: 700px; margin: 0 auto; padding: 40px 20px; }
    .card { background: white; border-radius: 32px; padding: 48px; border: 1px solid #f0cdc0; }
    .success-icon { font-size: 4rem; margin-bottom: 20px; }
    h1 { color: #6B1E2A; margin-bottom: 16px; }
    .order-number { background: #f9e0e4; padding: 8px 24px; border-radius: 40px; display: inline-block; margin: 20px 0; }
    .btn { background: #8C2A3B; color: white; padding: 12px 32px; border-radius: 60px; text-decoration: none; display: inline-block; margin: 16px 8px; }
    footer { background: #1f1210; color: #f2cfc4; padding: 32px 0; margin-top: 64px; }
  </style>
</head>
<body>
  <div class="container">
  <div class="navbar">
    <a href="index.html" class="logo">DK<span> Secrets</span></a>
    <div class="nav-links">
      <a href="index.html#products">Shop</a>
      <a href="index.html#products">Mists</a>
      <a href="index.html#products">Lotions</a>
      <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search..." class="search-input">
        <button id="searchBtn" class="search-btn">🔍</button>
      </div>
      <div class="cart-icon" id="cartIcon">🛒 <span class="cart-count" id="cartCount">0</span></div>
      <div id="authSection"><button class="auth-btn" id="authButton">Sign In</button></div>
    </div>
  </div>
</div>

  
<div class="container">
  <div class="card">
    <div class="success-icon">🎉</div>
    <h1>Order Confirmed!</h1>
    <p>Thank you for shopping at DK Secrets.</p>
    <div id="orderNumber" class="order-number">Loading...</div>
    <a href="index.html" class="btn">Continue Shopping</a>
    <a href="account.html" class="btn" style="background:white; color:#8C2A3B; border:1px solid #8C2A3B;">View Orders</a>
  </div>
</div>
<footer><div class="container"><p>© 2025 DK Secrets - Authentic Victoria's Secret</p></div></footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyDnMnyROtTSjvAswLAYAmpJrFf0wZEaYIM",
    authDomain: "dk-secret-mists-and-lotions.firebaseapp.com",
    projectId: "dk-secret-mists-and-lotions",
    storageBucket: "dk-secret-mists-and-lotions.firebasestorage.app",
    messagingSenderId: "153687274132",
    appId: "1:153687274132:web:e9de13864e001be927ba81"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const urlParams = new URLSearchParams(window.location.search);
  const orderId = urlParams.get('id');
  if (orderId) {
    const orderRef = doc(db, "orders", orderId);
    const orderSnap = await getDoc(orderRef);
    if (orderSnap.exists()) document.getElementById('orderNumber').innerHTML = `Order #${orderId.slice(-8)}`;
    else document.getElementById('orderNumber').innerHTML = 'Order not found';
  } else {
    document.getElementById('orderNumber').innerHTML = 'Order confirmed';
  }
/* Navbar styles (add if missing) */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0;
  flex-wrap: wrap;
  gap: 20px;
  border-bottom: 2px solid #f0cdc0;
}
.logo {
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, #8C2A3B, #C75C4A);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-decoration: none;
}
.logo span { background: none; color: #8C2A3B; }
.nav-links {
  display: flex;
  gap: 20px;
  align-items: center;
  flex-wrap: wrap;
}
.nav-links a {
  text-decoration: none;
  font-weight: 600;
  color: #8C2A3B;
  cursor: pointer;
}
.search-container {
  display: flex;
  align-items: center;
  gap: 8px;
}
.search-input {
  padding: 8px 16px;
  border-radius: 40px;
  border: 1px solid #f0cdc0;
  font-size: 0.85rem;
  width: 180px;
  transition: 0.2s;
}
.search-input:focus {
  outline: none;
  border-color: #C75C4A;
  width: 220px;
}
.search-btn {
  background: none;
  border: none;
  font-size: 1.2rem;
  cursor: pointer;
  color: #8C2A3B;
}
.cart-icon {
  position: relative;
  cursor: pointer;
  font-size: 1.6rem;
}
.cart-count {
  position: absolute;
  top: -8px;
  right: -12px;
  background: #C75C4A;
  color: white;
  font-size: 0.7rem;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.auth-btn {
  background: #8C2A3B;
  color: white;
  padding: 8px 20px;
  border-radius: 40px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.9rem;
}
.user-email {
  font-size: 0.8rem;
  color: #6B1E2A;
  margin-right: 12px;
}
@media (max-width: 768px) {
  .search-input { width: 120px; }
  .search-input:focus { width: 150px; }
  .nav-links { gap: 12px; }
}
  
</script>
</body>
</html>

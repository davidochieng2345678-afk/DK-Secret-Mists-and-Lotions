<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmation | DK World Kenya</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fffaf7; }
    .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }
    
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 2px solid #f0cdc0;
      margin-bottom: 40px;
    }
    .logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #8C2A3B, #C75C4A);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-decoration: none;
    }
    .logo span { background: none; color: #8C2A3B; }
    
    .confirmation-card {
      background: white;
      border-radius: 32px;
      padding: 48px;
      text-align: center;
      border: 1px solid #f0cdc0;
      margin: 40px 0;
    }
    .success-icon { font-size: 5rem; margin-bottom: 20px; }
    .order-number {
      background: #f9e0e4;
      padding: 8px 20px;
      border-radius: 40px;
      display: inline-block;
      margin: 20px 0;
      font-weight: 600;
    }
    .order-details { text-align: left; margin-top: 32px; padding-top: 32px; border-top: 1px solid #f0cdc0; }
    .detail-row { display: flex; justify-content: space-between; padding: 8px 0; }
    .btn-primary {
      background: #8C2A3B;
      color: white;
      padding: 14px 32px;
      border-radius: 60px;
      text-decoration: none;
      display: inline-block;
      margin-top: 32px;
      font-weight: 600;
    }
    .btn-secondary {
      background: white;
      color: #8C2A3B;
      border: 1px solid #8C2A3B;
      padding: 14px 32px;
      border-radius: 60px;
      text-decoration: none;
      display: inline-block;
      margin: 16px 8px;
    }
    footer { background: #1f1210; color: #f2cfc4; padding: 32px 0; margin-top: 64px; text-align: center; }
  </style>
</head>
<body>

<div class="container">
  <div class="navbar">
    <a href="index.html" class="logo">DK<span> World Kenya</span></a>
  </div>
  
  <div id="confirmationContent">
    <div class="confirmation-card">
      <div class="success-icon">🎉</div>
      <h1>Order Confirmed!</h1>
      <p>Thank you for shopping at DK World Kenya.</p>
      <div id="orderNumber" class="order-number">Loading...</div>
      <div id="orderDetails" class="order-details"></div>
      <a href="index.html" class="btn-primary">Continue Shopping</a>
      <a href="account.html" class="btn-secondary">View My Orders</a>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    <p>DK World Kenya - Authentic Victoria's Secret</p>
  </div>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyABCVM1b9FEdXlJWf1SoL7dwQL1EXPXwgA",
    authDomain: "dkworld-kenya.firebaseapp.com",
    projectId: "dkworld-kenya",
    storageBucket: "dkworld-kenya.firebasestorage.app",
    messagingSenderId: "263537160242",
    appId: "1:263537160242:web:85f756e7a0ea9fcf584c2b"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  
  const urlParams = new URLSearchParams(window.location.search);
  const orderId = urlParams.get('id');
  
  async function loadConfirmation() {
    if (!orderId) {
      document.getElementById('orderNumber').innerText = 'No order found';
      return;
    }
    
    const orderRef = doc(db, "orders", orderId);
    const orderSnap = await getDoc(orderRef);
    
    if (!orderSnap.exists()) {
      document.getElementById('orderNumber').innerText = 'Order not found';
      return;
    }
    
    const order = orderSnap.data();
    const totalKsh = (order.total * 145).toLocaleString();
    const itemsHtml = order.items.map(item => `<div class="detail-row"><span>${item.name} x ${item.quantity}</span><span>KSh ${(item.price * item.quantity * 145).toLocaleString()}</span></div>`).join('');
    
    document.getElementById('orderNumber').innerHTML = `Order #${orderId.slice(-8)}`;
    document.getElementById('orderDetails').innerHTML = `
      <h3>Order Summary</h3>
      ${itemsHtml}
      <div class="detail-row"><strong>Total</strong><strong>KSh ${totalKsh}</strong></div>
      <div class="detail-row"><span>Payment Method</span><span>${order.paymentMethod.toUpperCase()}</span></div>
      <div class="detail-row"><span>Shipping Address</span><span>${order.shippingAddress.street}, ${order.shippingAddress.city}</span></div>
      <div class="detail-row"><span>Estimated Delivery</span><span>3-5 business days</span></div>
    `;
  }
  
  loadConfirmation();
</script>
</body>
</html>

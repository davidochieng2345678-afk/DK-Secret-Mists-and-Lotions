<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | DK World Kenya</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fffaf7; color: #2d2a27; }
    .container { max-width: 1400px; margin: 0 auto; padding: 0 32px; }
    
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      flex-wrap: wrap;
      gap: 20px;
      border-bottom: 2px solid #f0cdc0;
    }
    .logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #8C2A3B, #C75C4A);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-decoration: none;
    }
    .logo span { background: none; color: #8C2A3B; }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-links a { text-decoration: none; font-weight: 600; color: #8C2A3B; cursor: pointer; }
    .cart-icon { position: relative; cursor: pointer; font-size: 1.6rem; }
    .cart-count {
      position: absolute; top: -8px; right: -12px; background: #C75C4A;
      color: white; font-size: 0.7rem; border-radius: 50%;
      width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
    }
    .auth-btn {
      background: #8C2A3B; color: white; padding: 8px 20px; border-radius: 40px;
      border: none; cursor: pointer; font-weight: 600;
    }
    .user-email { font-size: 0.8rem; color: #6B1E2A; margin-right: 12px; }
    
    .breadcrumb { margin: 24px 0; font-size: 0.85rem; color: #a64b3a; }
    .breadcrumb a { color: #8C2A3B; text-decoration: none; }
    
    .product-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      margin: 40px 0;
    }
    .product-image { width: 100%; border-radius: 28px; background: #f9ede5; }
    .product-info h1 { font-size: 2.2rem; color: #6B1E2A; margin-bottom: 16px; }
    .product-price { font-size: 2rem; font-weight: 800; color: #C75C4A; margin: 20px 0; }
    .product-stock {
      display: inline-block; padding: 6px 14px; border-radius: 30px;
      font-size: 0.8rem; font-weight: 600; margin-bottom: 20px;
    }
    .in-stock { background: #e0f2e9; color: #2e7d64; }
    .low-stock { background: #fff3e0; color: #c75c4a; }
    .out-of-stock { background: #fce4e4; color: #c75c4a; }
    .product-description { color: #5a4a3e; line-height: 1.6; margin: 20px 0; }
    .quantity-selector {
      display: flex; align-items: center; gap: 20px; margin: 30px 0;
    }
    .qty-btn {
      width: 44px; height: 44px; border-radius: 50%; border: 1px solid #f0cdc0;
      background: white; font-size: 1.4rem; cursor: pointer; color: #8C2A3B;
    }
    .qty-input { width: 60px; text-align: center; font-size: 1.2rem; font-weight: 600; border: 1px solid #f0cdc0; border-radius: 30px; padding: 10px; }
    .add-to-cart-btn {
      background: #8C2A3B; color: white; border: none; padding: 14px 48px;
      border-radius: 60px; font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%;
    }
    .add-to-cart-btn:disabled { background: #ccc; cursor: not-allowed; }
    
    footer { background: #1f1210; color: #f2cfc4; padding: 48px 0 24px; margin-top: 64px; }
    @media (max-width: 768px) {
      .product-detail { grid-template-columns: 1fr; gap: 30px; }
      .container { padding: 0 20px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="navbar">
    <a href="index.html" class="logo">DK<span> World Kenya</span></a>
    <div class="nav-links">
      <a href="index.html">Shop</a>
      <div class="cart-icon" id="cartIcon">🛒 <span class="cart-count" id="cartCount">0</span></div>
      <div id="authSection"><button class="auth-btn" id="authButton">Sign In</button></div>
    </div>
  </div>
</div>

<div class="container">
  <div class="breadcrumb"><a href="index.html">Home</a> / <span id="productNameBreadcrumb">Product</span></div>
  <div class="product-detail" id="productDetail"><div class="loading">Loading product...</div></div>
</div>

<footer>
  <div class="container"><div class="copyright"><p>DK World Kenya - Authentic Victoria's Secret</p></div></div>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyABCVM1b9FEdXlJWf1SoL7dwQL1EXPXwgA",
    authDomain: "dkworld-kenya.firebaseapp.com",
    projectId: "dkworld-kenya",
    storageBucket: "dkworld-kenya.firebasestorage.app",
    messagingSenderId: "263537160242",
    appId: "1:263537160242:web:85f756e7a0ea9fcf584c2b"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  
  let currentUser = null;
  let cart = [];
  let product = null;
  let quantity = 1;
  
  const urlParams = new URLSearchParams(window.location.search);
  const productId = urlParams.get('id');
  
  async function loadProduct() {
    if (!productId) {
      document.getElementById('productDetail').innerHTML = '<div class="loading">Product not found.</div>';
      return;
    }
    const productRef = doc(db, "products", productId);
    const productSnap = await getDoc(productRef);
    if (!productSnap.exists()) {
      document.getElementById('productDetail').innerHTML = '<div class="loading">Product not found.</div>';
      return;
    }
    product = { id: productSnap.id, ...productSnap.data() };
    renderProduct();
  }
  
  function renderProduct() {
    const stock = product.stock || 0;
    const stockStatus = stock > 10 ? 'in-stock' : (stock > 0 ? 'low-stock' : 'out-of-stock');
    const stockText = stock > 10 ? `In Stock (${stock} available)` : (stock > 0 ? `Low Stock (${stock} left)` : 'Out of Stock');
    const priceKsh = (product.price * 145).toLocaleString();
    
    document.getElementById('productDetail').innerHTML = `
      <img class="product-image" src="${product.imageUrl || 'https://placehold.co/800x800/FCE4D4/8C2A3B?text=' + encodeURIComponent(product.name)}" alt="${product.name}">
      <div class="product-info">
        <h1>${product.name}</h1>
        <div class="product-price">KSh ${priceKsh}</div>
        <div class="product-stock ${stockStatus}">${stockText}</div>
        <p class="product-description">${product.description || 'No description available.'}</p>
        <div class="quantity-selector">
          <button class="qty-btn" id="qtyMinus">-</button>
          <input class="qty-input" id="qtyInput" type="number" value="1" min="1" max="${stock}">
          <button class="qty-btn" id="qtyPlus">+</button>
        </div>
        <button class="add-to-cart-btn" id="addToCartBtn" ${stock === 0 ? 'disabled' : ''}>Add to Cart</button>
      </div>
    `;
    
    document.getElementById('productNameBreadcrumb').innerText = product.name;
    
    // Quantity controls
    const qtyInput = document.getElementById('qtyInput');
    document.getElementById('qtyMinus').onclick = () => {
      if (quantity > 1) { quantity--; qtyInput.value = quantity; }
    };
    document.getElementById('qtyPlus').onclick = () => {
      if (quantity < stock) { quantity++; qtyInput.value = quantity; }
    };
    qtyInput.onchange = (e) => {
      let val = parseInt(e.target.value);
      quantity = Math.min(Math.max(val, 1), stock);
      qtyInput.value = quantity;
    };
    
    document.getElementById('addToCartBtn').onclick = () => addToCart();
  }
  
  async function addToCart() {
    if (!product) return;
    if (product.stock <= 0) {
      alert("Out of stock!");
      return;
    }
    if (quantity > product.stock) {
      alert(`Only ${product.stock} left in stock!`);
      return;
    }
    
    // Load current cart
    if (currentUser) {
      const cartRef = doc(db, "carts", currentUser.uid);
      const cartDoc = await getDoc(cartRef);
      let cartItems = cartDoc.exists() ? cartDoc.data().items : [];
      const existingIndex = cartItems.findIndex(item => item.id === product.id);
      if (existingIndex !== -1) {
        if (cartItems[existingIndex].quantity + quantity > product.stock) {
          alert(`Only ${product.stock} left in stock!`);
          return;
        }
        cartItems[existingIndex].quantity += quantity;
      } else {
        cartItems.push({ id: product.id, name: product.name, price: product.price, quantity: quantity });
      }
      await setDoc(cartRef, { items: cartItems, updatedAt: new Date() }, { merge: true });
    } else {
      let localCart = JSON.parse(localStorage.getItem('dkCart')) || [];
      const existingIndex = localCart.findIndex(item => item.id === product.id);
      if (existingIndex !== -1) {
        if (localCart[existingIndex].quantity + quantity > product.stock) {
          alert(`Only ${product.stock} left in stock!`);
          return;
        }
        localCart[existingIndex].quantity += quantity;
      } else {
        localCart.push({ id: product.id, name: product.name, price: product.price, quantity: quantity });
      }
      localStorage.setItem('dkCart', JSON.stringify(localCart));
    }
    alert(`${quantity} × ${product.name} added to cart!`);
    updateCartCount();
  }
  
  async function updateCartCount() {
    let count = 0;
    if (currentUser) {
      const cartRef = doc(db, "carts", currentUser.uid);
      const cartDoc = await getDoc(cartRef);
      if (cartDoc.exists()) {
        count = cartDoc.data().items.reduce((sum, i) => sum + i.quantity, 0);
      }
    } else {
      const localCart = JSON.parse(localStorage.getItem('dkCart')) || [];
      count = localCart.reduce((sum, i) => sum + i.quantity, 0);
    }
    document.getElementById('cartCount').innerText = count;
  }
  
  // Auth UI
  function updateAuthUI(user) {
    const authSection = document.getElementById('authSection');
    if (user) {
      authSection.innerHTML = `<span class="user-email">${user.email}</span> <button class="auth-btn" id="authButton">Logout</button>`;
      document.getElementById('authButton').onclick = () => signOut(auth);
    } else {
      authSection.innerHTML = `<button class="auth-btn" id="authButton">Sign In</button>`;
      document.getElementById('authButton').onclick = () => {
        const email = prompt("Email:");
        const password = prompt("Password:");
        if (email && password) {
          signInWithEmailAndPassword(auth, email, password).catch(() => {
            if (confirm("Create new account?")) createUserWithEmailAndPassword(auth, email, password);
          });
        }
      };
    }
  }
  
  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    updateAuthUI(user);
    await updateCartCount();
  });
  
  document.getElementById('cartIcon').onclick = () => window.location.href = 'cart.html';
  
  loadProduct();
</script>
</body>
</html>
